networks:
  crawler-net:
    name: crawler-net

services:
  redis:
    image: redis:7-alpine
    container_name: redis-server
    networks:
      - crawler-net
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  orchestrator:
    build: ./redis_server
    container_name: orchestrator
    networks:
      - crawler-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./workers:/app/workers
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      PROXY_HOST_DIR: ${PROXY_HOST_DIR}
      PROXY_CHECK_DIR: /app/workers/Proxy
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build: ./Dashboard
    container_name: dashboard
    networks:
      - crawler-net
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_DB: 0
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: 5000
      DEBUG: "False"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
