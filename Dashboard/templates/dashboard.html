<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Queue Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #4a6cf7;
            --success-color: #22c55e;
            --warning-color: #eab308;
            --danger-color: #ef4444;
            --info-color: #3b82f6;
            --bg-light: #f1f5f9;
            --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 0;
        }

        .navbar-custom {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            padding: 0.75rem 0;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-custom .navbar-brand {
            color: white;
            font-weight: 600;
            font-size: 1.25rem;
        }

        .navbar-custom .navbar-brand i {
            margin-right: 10px;
            color: #4a6cf7;
        }

        .navbar-custom .nav-link {
            color: rgba(255,255,255,0.7);
            font-size: 0.875rem;
        }

        .navbar-custom .nav-link:hover {
            color: white;
        }

        .container-fluid {
            max-width: 1440px;
            padding: 1rem 1.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: white;
            padding: 1rem 1.25rem;
            border-radius: 10px;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .stat-icon-wrapper {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .stat-icon-wrapper.queued { background: #fef3c7; color: #d97706; }
        .stat-icon-wrapper.started { background: #cffafe; color: #0891b2; }
        .stat-icon-wrapper.running { background: #dbeafe; color: #2563eb; }
        .stat-icon-wrapper.finished { background: #d1fae5; color: #059669; }
        .stat-icon-wrapper.failed { background: #fee2e2; color: #dc2626; }

        .stat-content {
            flex: 1;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .stat-label {
            color: #64748b;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card.queued .stat-number { color: #d97706; }
        .stat-card.started .stat-number { color: #0891b2; }
        .stat-card.running .stat-number { color: #2563eb; }
        .stat-card.finished .stat-number { color: #059669; }
        .stat-card.failed .stat-number { color: #dc2626; }

        .action-bar {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .action-bar .btn {
            font-size: 0.875rem;
            padding: 0.5rem 1rem;
        }

        .job-columns {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
        }

        .job-column {
            background: white;
            border-radius: 10px;
            padding: 1rem;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(0,0,0,0.05);
            max-height: 600px;
            display: flex;
            flex-direction: column;
        }

        .job-column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #f1f5f9;
            flex-shrink: 0;
        }

        .job-column-header h5 {
            margin: 0;
            font-weight: 600;
            font-size: 1rem;
        }

        .job-column-header .badge {
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
        }

        .job-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 0.25rem;
        }

        .job-list::-webkit-scrollbar {
            width: 4px;
        }

        .job-list::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }

        .job-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .job-item {
            background: #f8fafc;
            padding: 0.6rem 0.75rem;
            margin-bottom: 0.4rem;
            border-radius: 6px;
            border-left: 3px solid #e2e8f0;
            transition: background 0.2s;
            animation: slideIn 0.3s ease-out;
        }

        .job-item:hover {
            background: #f1f5f9;
        }

        .job-item.queued { border-left-color: #eab308; }
        .job-item.started { border-left-color: #0891b2; }
        .job-item.running { border-left-color: #3b82f6; }
        .job-item.finished { border-left-color: #22c55e; }
        .job-item.failed { border-left-color: #ef4444; }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .job-id {
            font-family: 'Courier New', monospace;
            font-size: 0.65rem;
            color: #94a3b8;
        }

        .job-name {
            font-weight: 500;
            font-size: 0.875rem;
            color: #1e293b;
            margin: 0.1rem 0;
            word-break: break-word;
        }

        .job-meta {
            font-size: 0.7rem;
            color: #94a3b8;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .job-meta i {
            margin-right: 0.15rem;
        }

        .job-result {
            font-size: 0.75rem;
            color: #059669;
            margin-top: 0.15rem;
            padding: 0.1rem 0.5rem;
            background: #dcfce7;
            border-radius: 4px;
            display: inline-block;
        }

        .job-error {
            font-size: 0.75rem;
            color: #dc2626;
            margin-top: 0.15rem;
            padding: 0.1rem 0.5rem;
            background: #fee2e2;
            border-radius: 4px;
            display: inline-block;
            word-break: break-word;
        }

        .empty-state {
            text-align: center;
            padding: 2rem 0;
            color: #94a3b8;
        }

        .empty-state i {
            font-size: 2rem;
            opacity: 0.3;
            display: block;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            margin: 0;
            font-size: 0.875rem;
        }

        .footer-info {
            margin-top: 1.5rem;
            padding: 0.75rem;
            background: white;
            border-radius: 10px;
            box-shadow: var(--card-shadow);
            text-align: center;
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .footer-info i {
            margin: 0 0.5rem;
        }

        .toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.75rem;
            color: #22c55e;
        }

        .live-indicator .dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-custom">
        <div class="container-fluid">
            <span class="navbar-brand">
                <i class="bi bi-speedometer2"></i>
                Job Queue Dashboard
            </span>
            <div class="d-flex align-items-center gap-3">
                <span class="live-indicator">
                    <span class="dot"></span>
                    Live
                </span>
                <span class="text-white-50" style="font-size:0.8rem;" id="lastUpdate">Updated: --</span>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card queued" onclick="location.href='/jobs/queued'" style="cursor:pointer">
                <div class="stat-icon-wrapper queued"><i class="bi bi-clock-history"></i></div>
                <div class="stat-content">
                    <div class="stat-number" id="queuedCount">0</div>
                    <div class="stat-label">Queued</div>
                </div>
            </div>
            <div class="stat-card running" onclick="location.href='/jobs/running'" style="cursor:pointer">
                <div class="stat-icon-wrapper running"><i class="bi bi-play-circle"></i></div>
                <div class="stat-content">
                    <div class="stat-number" id="runningCount">0</div>
                    <div class="stat-label">Running</div>
                </div>
            </div>
            <div class="stat-card finished" onclick="location.href='/jobs/finished'" style="cursor:pointer">
                <div class="stat-icon-wrapper finished"><i class="bi bi-check-circle"></i></div>
                <div class="stat-content">
                    <div class="stat-number" id="finishedCount">0</div>
                    <div class="stat-label">Completed</div>
                </div>
            </div>
            <div class="stat-card failed" onclick="location.href='/jobs/failed'" style="cursor:pointer">
                <div class="stat-icon-wrapper failed"><i class="bi bi-x-circle"></i></div>
                <div class="stat-content">
                    <div class="stat-number" id="failedCount">0</div>
                    <div class="stat-label">Failed</div>
                </div>
            </div>
        </div>

        <!-- Action Bar -->
        <div class="action-bar">
            <button class="btn btn-primary" onclick="refreshData()">
                <i class="bi bi-arrow-clockwise"></i> Refresh
            </button>
            <button class="btn btn-warning" onclick="clearState('queued')">
                <i class="bi bi-trash"></i> Clear Queued
            </button>
            <button class="btn btn-primary" onclick="clearState('running')">
                <i class="bi bi-trash"></i> Clear Running
            </button>
            <button class="btn btn-success" onclick="clearState('finished')">
                <i class="bi bi-trash"></i> Delete Completed
            </button>
            <button class="btn btn-danger" onclick="clearState('failed')">
                <i class="bi bi-trash"></i> Clear Failed
            </button>
            <button class="btn btn-outline-secondary" onclick="toggleAutoRefresh()" id="autoRefreshBtn">
                <i class="bi bi-pause-circle"></i> Pause
            </button>
        </div>

        <!-- Jobs -->
        <div class="job-columns">
            <!-- Queued -->
            <div class="job-column" id="queued">
                <div class="job-column-header">
                    <h5><i class="bi bi-clock-history text-warning"></i> Queued</h5>
                    <span class="badge bg-warning" id="queuedBadge">0</span>
                </div>
                <div class="job-list" id="queuedJobs">
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <p>No queued jobs</p>
                    </div>
                </div>
            </div>

            <!-- Running -->
            <div class="job-column" id="running">
                <div class="job-column-header">
                    <h5><i class="bi bi-play-circle text-primary"></i> Running</h5>
                    <span class="badge bg-primary" id="runningBadge">0</span>
                </div>
                <div class="job-list" id="runningJobs">
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <p>No running jobs</p>
                    </div>
                </div>
            </div>

            <!-- Completed -->
            <div class="job-column" id="finished">
                <div class="job-column-header">
                    <h5><i class="bi bi-check-circle text-success"></i> Completed</h5>
                    <span class="badge bg-success" id="finishedBadge">0</span>
                </div>
                <div class="job-list" id="finishedJobs">
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <p>No completed jobs</p>
                    </div>
                </div>
            </div>

            <!-- Failed -->
            <div class="job-column" id="failed">
                <div class="job-column-header">
                    <h5><i class="bi bi-x-circle text-danger"></i> Failed</h5>
                    <span class="badge bg-danger" id="failedBadge">0</span>
                </div>
                <div class="job-list" id="failedJobs">
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <p>No failed jobs</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer-info">
            <i class="bi bi-database"></i>
            Redis: <span id="redisInfo">Connecting...</span>
            <i class="bi bi-dot"></i>
            <span id="totalJobs">Total: 0 jobs</span>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        let autoRefresh = true;
        let refreshInterval = 3000;
        let intervalId = null;

        // Toast notification
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const colors = {
                success: 'bg-success text-white',
                error: 'bg-danger text-white',
                warning: 'bg-warning',
                info: 'bg-info text-white'
            };

            const toast = document.createElement('div');
            toast.className = `toast align-items-center ${colors[type] || colors.info} border-0 show`;
            toast.role = 'alert';
            toast.innerHTML = `
                <div class="d-flex">
                    <div class="toast-body">${message}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Scroll to section
        function scrollToSection(id) {
            const element = document.getElementById(id);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // Clear state
        async function clearState(state) {
            if (!confirm(`Are you sure you want to clear all ${state} jobs?`)) {
                return;
            }

            try {
                const response = await fetch(`/api/clear_state/${state}`, { method: 'POST' });
                if (!response.ok) throw new Error('Failed to clear');
                const data = await response.json();
                showToast(`Cleared ${data.deleted} ${state} jobs`, 'success');
                loadData();
            } catch (error) {
                console.error('Error:', error);
                showToast('Failed to clear jobs', 'error');
            }
        }

        // Clear failed jobs
        async function clearFailed() {
            if (!confirm('Are you sure you want to clear all failed jobs?')) {
                return;
            }

            try {
                const response = await fetch('/api/clear_failed', { method: 'POST' });
                if (!response.ok) throw new Error('Failed to clear');
                const data = await response.json();
                showToast(`Cleared ${data.deleted} failed jobs`, 'success');
                loadData();
            } catch (error) {
                console.error('Error:', error);
                showToast('Failed to clear failed jobs', 'error');
            }
        }

        // Render jobs
        function renderJobs(type, jobs) {
            const container = document.getElementById(`${type}Jobs`);
            const badge = document.getElementById(`${type}Badge`);

            if (!container || !badge) return;

            badge.textContent = jobs.length;

            if (jobs.length === 0) {
                const emptyMessages = {
                    'queued': 'No queued jobs',
                    'started': 'No waiting jobs',
                    'running': 'No running jobs',
                    'finished': 'No completed jobs',
                    'failed': 'No failed jobs'
                };
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <p>${emptyMessages[type] || 'No jobs'}</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = jobs.map(job => {
                let metaHtml = `<span><i class="bi bi-diagram-3"></i> ${job.domain}</span>`;

                if (job.http_code) {
                    metaHtml += `<span><i class="bi bi-globe"></i> HTTP ${job.http_code}</span>`;
                }

                if (job.total_elapsed_seconds) {
                    metaHtml += `<span><i class="bi bi-stopwatch"></i> ${job.total_elapsed_seconds.toFixed(2)}s</span>`;
                }

                if (job.html_size) {
                    const sizeKB = (job.html_size / 1024).toFixed(1);
                    metaHtml += `<span><i class="bi bi-file-earmark"></i> ${sizeKB}KB</span>`;
                }

                let resultHtml = '';
                if (job.status === 'success' && type === 'finished') {
                    resultHtml = `<div class="job-result"><i class="bi bi-check-circle"></i> Success</div>`;
                }

                let errorHtml = '';
                if (job.error) {
                    const errorMsg = job.error.length > 80 ? job.error.substring(0, 80) + '...' : job.error;
                    errorHtml = `<div class="job-error"><i class="bi bi-exclamation-triangle"></i> ${errorMsg}</div>`;
                }

                return `
                    <div class="job-item ${type}">
                        <div class="job-id">#${job.ret_key}</div>
                        <div class="job-name">${job.url}</div>
                        <div class="job-meta">${metaHtml}</div>
                        ${resultHtml}
                        ${errorHtml}
                    </div>
                `;
            }).join('');
        }

        // Load data
        async function loadData() {
            try {
                const response = await fetch('/api/jobs');
                if (!response.ok) throw new Error('Failed to fetch');
                const data = await response.json();

                console.log('API data:', data);

                document.getElementById('queuedCount').textContent = (data.queued || []).length;
                document.getElementById('runningCount').textContent = (data.running || []).length;
                document.getElementById('finishedCount').textContent = (data.finished || []).length;
                document.getElementById('failedCount').textContent = (data.failed || []).length;

                renderJobs('queued', data.queued || []);
                renderJobs('running', data.running || []);
                renderJobs('finished', data.finished || []);
                renderJobs('failed', data.failed || []);

                const total = (data.queued || []).length + (data.running || []).length + (data.finished || []).length + (data.failed || []).length;
                document.getElementById('totalJobs').textContent = `Total: ${total} jobs`;
                document.getElementById('lastUpdate').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
                document.getElementById('redisInfo').textContent = '✅ Connected';
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('redisInfo').textContent = '❌ Error';
            }
        }

        // Refresh data
        function refreshData() {
            loadData();
            showToast('Refreshed', 'info');
        }

        // Toggle auto refresh
        function toggleAutoRefresh() {
            autoRefresh = !autoRefresh;
            const btn = document.getElementById('autoRefreshBtn');

            if (autoRefresh) {
                btn.innerHTML = '<i class="bi bi-pause-circle"></i> Pause';
                btn.className = 'btn btn-outline-secondary';
                startAutoRefresh();
                showToast('Auto-refresh: ON', 'success');
            } else {
                btn.innerHTML = '<i class="bi bi-play-circle"></i> Resume';
                btn.className = 'btn btn-outline-success';
                stopAutoRefresh();
                showToast('Auto-refresh: OFF', 'warning');
            }
        }

        function startAutoRefresh() {
            if (intervalId) clearInterval(intervalId);
            intervalId = setInterval(loadData, refreshInterval);
        }

        function stopAutoRefresh() {
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            startAutoRefresh();
        });

        window.addEventListener('beforeunload', function() {
            stopAutoRefresh();
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
